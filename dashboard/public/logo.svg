<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#111" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#080808"/>
  <rect width="800" height="200" fill="url(#grid)" opacity="0.5"/>

  <!-- Outer border -->
  <rect x="12" y="12" width="776" height="176" fill="none" stroke="#1c1c1c" stroke-width="1"/>

  <!-- Corner ticks -->
  <line x1="12" y1="12" x2="36" y2="12" stroke="#34d399" stroke-width="1.5"/>
  <line x1="12" y1="12" x2="12" y2="36" stroke="#34d399" stroke-width="1.5"/>
  <line x1="788" y1="12" x2="764" y2="12" stroke="#34d399" stroke-width="1.5"/>
  <line x1="788" y1="12" x2="788" y2="36" stroke="#34d399" stroke-width="1.5"/>
  <line x1="12" y1="188" x2="36" y2="188" stroke="#34d399" stroke-width="1.5"/>
  <line x1="12" y1="188" x2="12" y2="164" stroke="#34d399" stroke-width="1.5"/>
  <line x1="788" y1="188" x2="764" y2="188" stroke="#34d399" stroke-width="1.5"/>
  <line x1="788" y1="188" x2="788" y2="164" stroke="#34d399" stroke-width="1.5"/>

  <!-- Ambient glow -->
  <ellipse cx="220" cy="100" rx="160" ry="60" fill="#34d399" opacity="0.03"/>

  <!-- "o" ring -->
  <circle cx="80" cy="96" r="44" fill="none" stroke="#34d399" stroke-width="5" opacity="0.9" filter="url(#glow)"/>
  <circle cx="80" cy="96" r="18" fill="#34d399" opacity="0.07"/>
  <circle cx="80" cy="96" r="4" fill="#34d399"/>
  <!-- pulse ring -->
  <circle cx="80" cy="96" r="4" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r" values="4;18;4" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- "88" -->
  <text
    x="138"
    y="136"
    font-family="'Courier New', Courier, monospace"
    font-size="88"
    font-weight="700"
    fill="#f4f4f5"
    letter-spacing="-2"
  >88</text>

  <!-- ".gg" in emerald -->
  <text
    x="334"
    y="136"
    font-family="'Courier New', Courier, monospace"
    font-size="88"
    font-weight="700"
    fill="#34d399"
    opacity="0.85"
  >.gg</text>

  <!-- vertical divider -->
  <line x1="548" y1="40" x2="548" y2="160" stroke="#1f1f1f" stroke-width="1"/>

  <!-- right side: tagline block -->
  <text
    x="576"
    y="80"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    fill="#52525b"
    letter-spacing="3"
  >DEEPBOOK NATIVE OPERATOR</text>

  <text
    x="576"
    y="108"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    fill="#3f3f46"
    letter-spacing="2"
  >Predict · Margin · Spot</text>

  <text
    x="576"
    y="136"
    font-family="'Courier New', Courier, monospace"
    font-size="10"
    fill="#27272a"
    letter-spacing="2"
  >Block Scholes SVI Oracle</text>

  <!-- live dot -->
  <circle cx="576" cy="154" r="3.5" fill="#34d399" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text
    x="588"
    y="158"
    font-family="'Courier New', Courier, monospace"
    font-size="9"
    fill="#34d399"
    opacity="0.6"
    letter-spacing="2"
  >LIVE · SUI OVERFLOW 2026</text>
</svg>
