<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#111" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#080808"/>
  <rect width="400" height="400" fill="url(#grid)" opacity="0.6"/>

  <!-- Outer border -->
  <rect x="16" y="16" width="368" height="368" fill="none" stroke="#1c1c1c" stroke-width="1"/>

  <!-- Corner ticks -->
  <line x1="16" y1="16" x2="40" y2="16" stroke="#34d399" stroke-width="1.5"/>
  <line x1="16" y1="16" x2="16" y2="40" stroke="#34d399" stroke-width="1.5"/>
  <line x1="384" y1="16" x2="360" y2="16" stroke="#34d399" stroke-width="1.5"/>
  <line x1="384" y1="16" x2="384" y2="40" stroke="#34d399" stroke-width="1.5"/>
  <line x1="16" y1="384" x2="40" y2="384" stroke="#34d399" stroke-width="1.5"/>
  <line x1="16" y1="384" x2="16" y2="360" stroke="#34d399" stroke-width="1.5"/>
  <line x1="384" y1="384" x2="360" y2="384" stroke="#34d399" stroke-width="1.5"/>
  <line x1="384" y1="384" x2="384" y2="360" stroke="#34d399" stroke-width="1.5"/>

  <!-- Emerald glow ambient -->
  <ellipse cx="200" cy="185" rx="120" ry="60" fill="#34d399" opacity="0.04"/>

  <!-- "o" — emerald ring representing a binary option -->
  <circle cx="108" cy="178" r="54" fill="none" stroke="#34d399" stroke-width="5.5" opacity="0.9" filter="url(#glow)"/>
  <!-- inner fill hint -->
  <circle cx="108" cy="178" r="24" fill="#34d399" opacity="0.08"/>
  <!-- center pulse dot -->
  <circle cx="108" cy="178" r="5" fill="#34d399"/>

  <!-- "88" in white monospace -->
  <text
    x="178"
    y="218"
    font-family="'Courier New', Courier, monospace"
    font-size="96"
    font-weight="700"
    fill="#f4f4f5"
    letter-spacing="-2"
  >88</text>

  <!-- scan line divider -->
  <line x1="40" y1="256" x2="360" y2="256" stroke="#1a1a1a" stroke-width="1"/>

  <!-- tagline -->
  <text
    x="200"
    y="285"
    font-family="'Courier New', Courier, monospace"
    font-size="10"
    fill="#3f3f46"
    text-anchor="middle"
    letter-spacing="4"
  >DEEPBOOK NATIVE OPERATOR</text>

  <!-- domain hint -->
  <text
    x="200"
    y="312"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    fill="#34d399"
    text-anchor="middle"
    letter-spacing="2"
    opacity="0.5"
  >o88.gg</text>

  <!-- pulse ring animation on the "o" center dot -->
  <circle cx="108" cy="178" r="5" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.6">
    <animate attributeName="r" values="5;20;5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
